---
- name: Require a supported Ubuntu host
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] == "Ubuntu"
      - (ansible_facts["distribution_major_version"] | int) >= 24
    fail_msg: >-
      The base role currently supports Ubuntu 24.04 or newer; found
      {{ ansible_facts["distribution"] }} {{ ansible_facts["distribution_version"] }}.

- name: Install base administration and security packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: "{{ base_apt_cache_valid_time }}"
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a

- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: dist
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a

- name: Check the requested timezone data exists
  ansible.builtin.stat:
    path: "/usr/share/zoneinfo/{{ base_timezone }}"
  register: base_timezone_data

- name: Require a valid server timezone
  ansible.builtin.assert:
    that:
      - base_timezone_data.stat.exists
      - base_timezone_data.stat.isreg
    fail_msg: "Unknown timezone: {{ base_timezone }}"

- name: Set the local timezone data
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ base_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
    owner: root
    group: root

- name: Record the local timezone name
  ansible.builtin.copy:
    content: "{{ base_timezone }}\n"
    dest: /etc/timezone
    owner: root
    group: root
    mode: "0644"

- name: Enable chrony time synchronization
  ansible.builtin.systemd_service:
    name: chrony.service
    enabled: true
    state: started

- name: Enable daily package metadata refresh and unattended upgrades
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Configure unattended-upgrade behavior
  ansible.builtin.copy:
    content: |
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
    dest: /etc/apt/apt.conf.d/52infra-unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Enable apt maintenance timers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

- name: Create the journald configuration directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure persistent bounded system logs
  ansible.builtin.copy:
    content: |
      [Journal]
      Storage=persistent
      Compress=yes
      SystemMaxUse={{ base_journal_system_max_use }}
      MaxRetentionSec={{ base_journal_max_retention }}
    dest: /etc/systemd/journald.conf.d/10-infra.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald

- name: Create the persistent journal directory
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    owner: root
    group: systemd-journal
    mode: "2755"
  notify: Restart journald

- name: Apply base-service handlers before verification
  ansible.builtin.meta: flush_handlers

- name: Check whether upgraded packages require a reboot
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: base_reboot_required

- name: Reboot after package upgrades when required
  ansible.builtin.reboot:
    msg: Reboot initiated by the infra base role after package upgrades
    connect_timeout: 10
    reboot_timeout: 600
    post_reboot_delay: 5
  when:
    - base_reboot_when_required | bool
    - base_reboot_required.stat.exists

- name: Verify required base services are active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - chrony.service
      - apt-daily.timer
      - apt-daily-upgrade.timer
  check_mode: false
  changed_when: false

- name: Wait for network time synchronization
  ansible.builtin.command:
    argv:
      - timedatectl
      - show
      - --property=NTPSynchronized
      - --value
  register: base_ntp_synchronized
  check_mode: false
  changed_when: false
  retries: 10
  delay: 3
  until: base_ntp_synchronized.stdout | trim == "yes"

- name: Read the unattended-upgrade interval
  ansible.builtin.command:
    argv:
      - apt-config
      - shell
      - unattended_interval
      - APT::Periodic::Unattended-Upgrade
  register: base_unattended_interval
  check_mode: false
  changed_when: false

- name: Require daily unattended upgrades
  ansible.builtin.assert:
    that:
      - "\"unattended_interval='1'\" in base_unattended_interval.stdout"
    fail_msg: Daily unattended upgrades are not enabled in the effective apt configuration.
