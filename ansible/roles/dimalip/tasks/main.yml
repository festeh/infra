---
- name: Require the reviewed dimalip.in domains
  ansible.builtin.assert:
    that:
      - dimalip_domains | length == 2
      - dimalip_domains | unique | length == dimalip_domains | length
      - >-
        dimalip_domains
        | select('match', '^[a-z0-9.-]+$')
        | list
        | length == dimalip_domains | length
    fail_msg: The dimalip.in public-domain declaration is invalid.
    quiet: true

- name: Converge the restricted dimalip.in static release
  ansible.builtin.include_role:
    name: static_release
  vars:
    static_release_name: dimalip.in
    static_release_deploy_user: "{{ dimalip_deploy_user }}"
    static_release_deploy_group: "{{ dimalip_deploy_group }}"
    static_release_deploy_home: "{{ dimalip_deploy_home }}"
    static_release_deploy_public_key: "{{ dimalip_deploy_public_key }}"
    static_release_deploy_command_path: "{{ dimalip_deploy_command_path }}"
    static_release_incoming_directory: "{{ dimalip_incoming_directory }}"
    static_release_install_root: "{{ dimalip_install_root }}"
    static_release_release_root: "{{ dimalip_release_root }}"
    static_release_current_path: "{{ dimalip_current_path }}"
    static_release_retention: "{{ dimalip_release_retention }}"
    static_release_max_artifact_bytes: "{{ dimalip_max_artifact_bytes }}"
    static_release_max_extracted_bytes: "{{ dimalip_max_extracted_bytes }}"
    static_release_max_archive_members: "{{ dimalip_max_archive_members }}"
    static_release_artifact_path: "{{ dimalip_release_artifact_path }}"
    static_release_required_files:
      - index.html
      - visualizations.json

- name: Inspect the dimalip.in Caddy route before convergence
  ansible.builtin.stat:
    path: "{{ caddy_sites_directory }}/40-dimalip.caddy"
  register: dimalip_caddy_route_before_apply

- name: Install the static dimalip.in Caddy route
  ansible.builtin.template:
    src: 40-dimalip.caddy.j2
    dest: "{{ caddy_sites_directory }}/40-dimalip.caddy"
    owner: root
    group: caddy
    mode: "0640"
  register: dimalip_caddy_route

- name: Require canonical formatting for the dimalip.in Caddy route
  ansible.builtin.command:
    argv:
      - caddy
      - fmt
      - --diff
      - "{{ caddy_sites_directory }}/40-dimalip.caddy"
  become_user: caddy
  check_mode: false
  changed_when: false
  when:
    - not ansible_check_mode or dimalip_caddy_route_before_apply.stat.exists

- name: Validate Caddy after adding the dimalip.in route
  ansible.builtin.command:
    argv:
      - caddy
      - validate
      - --config
      - /etc/caddy/Caddyfile
      - --adapter
      - caddyfile
  become_user: caddy
  environment:
    HOME: /var/lib/caddy
    XDG_CONFIG_HOME: /var/lib/caddy/.config
    XDG_DATA_HOME: /var/lib/caddy/.local/share
  check_mode: false
  changed_when: false
  when:
    - not ansible_check_mode or dimalip_caddy_route_before_apply.stat.exists

- name: Gracefully activate the dimalip.in Caddy route
  ansible.builtin.systemd_service:
    name: caddy.service
    state: reloaded
  when:
    - dimalip_caddy_route.changed
    - not ansible_check_mode

- name: Check the public dimalip.in routes
  ansible.builtin.command:
    argv:
      - curl
      - --silent
      - --show-error
      - --output
      - /dev/null
      - --write-out
      - "%{http_code}"
      - --connect-timeout
      - "5"
      - --max-time
      - "20"
      - --retry
      - "6"
      - --retry-delay
      - "2"
      - --retry-all-errors
      - --noproxy
      - "*"
      - --resolve
      - "{{ item.host }}:443:127.0.0.1"
      - "https://{{ item.host }}{{ item.path }}"
  loop:
    - host: "{{ dimalip_domains[0] }}"
      path: /
      status: "200"
    - host: "{{ dimalip_domains[0] }}"
      path: /visualizations.json
      status: "200"
    - host: "{{ dimalip_domains[0] }}"
      path: /api/visualizations
      status: "404"
    - host: "{{ dimalip_domains[0] }}"
      path: /infra-static-negative-probe
      status: "404"
    - host: "{{ dimalip_domains[1] }}"
      path: /
      status: "200"
  loop_control:
    label: "https://{{ item.host }}{{ item.path }}"
  register: dimalip_public_routes
  check_mode: false
  changed_when: false
  when: not ansible_check_mode

- name: Require the reviewed public dimalip.in behavior
  ansible.builtin.assert:
    that:
      - item.stdout | trim == item.item.status
    fail_msg: >-
      Unexpected response from https://{{ item.item.host }}{{ item.item.path }}:
      expected {{ item.item.status }}, received {{ item.stdout | trim }}.
    quiet: true
  loop: "{{ dimalip_public_routes.results }}"
  loop_control:
    label: "https://{{ item.item.host }}{{ item.item.path }}"
  when: not ansible_check_mode

- name: Check for an obsolete dimalip.in application listener
  ansible.builtin.command:
    argv:
      - ss
      - --tcp
      - --listening
      - --numeric
      - --no-header
      - sport = :6190
  register: dimalip_obsolete_listener
  check_mode: false
  changed_when: false

- name: Require dimalip.in to have no application listener
  ansible.builtin.assert:
    that:
      - dimalip_obsolete_listener.stdout | trim | length == 0
    fail_msg: >-
      TCP/6190 is still listening even though dimalip.in is fully static.
    quiet: true
