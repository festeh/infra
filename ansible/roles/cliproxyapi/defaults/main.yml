---
cliproxyapi_version: "7.2.88"
cliproxyapi_release_architectures:
  x86_64: amd64
  aarch64: aarch64
cliproxyapi_release_checksums:
  x86_64: sha256:9ab153cf450ea7d4cb359dbb1de88873578f3dffef34d569c2388c5f5152e294
