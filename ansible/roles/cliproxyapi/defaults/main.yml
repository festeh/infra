cliproxyapi_domain: ai.dimalip.in

cliproxyapi_install_root: /opt/cliproxyapi
cliproxyapi_release_root: "{{ cliproxyapi_install_root }}/releases"
cliproxyapi_release_directory: "{{ cliproxyapi_release_root }}/{{ cliproxyapi_version }}"
cliproxyapi_current_path: "{{ cliproxyapi_install_root }}/current"
cliproxyapi_binary_path: "{{ cliproxyapi_current_path }}/cli-proxy-api"
cliproxyapi_cache_directory: /var/cache/cliproxyapi
cliproxyapi_config_directory: /etc/cliproxyapi
cliproxyapi_config_path: "{{ cliproxyapi_config_directory }}/config.yaml"
cliproxyapi_state_directory: /var/lib/cliproxyapi
cliproxyapi_auth_directory: "{{ cliproxyapi_state_directory }}/auth"
cliproxyapi_management_panel_path: >-
  {{ cliproxyapi_state_directory }}/management.html
cliproxyapi_management_panel_version: "1.18.5"
