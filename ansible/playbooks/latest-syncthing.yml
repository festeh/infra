---
# Installs Syncthing (official apt repo, v2 channel) and configures it as an
# always-on, untrusted sync peer for the markdown vault: the folder is stored
# encrypted at rest (receiveencrypted), so the server never sees note
# contents. Trusted devices (laptop, phone) hold the folder encryption
# password; see SYNCTHING_VAULT_ENCRYPTION_PASSWORD in secrets.yml.
#
# Usage:
#   ansible-playbook playbooks/latest-syncthing.yml \
#     -e laptop_device_id=XXXXXXX-...
#
# The play prints the server's device ID at the end — add it on each trusted
# device with address tcp://<server-ip>:22000.
- name: Install and Configure Syncthing
  hosts: all
  become: true
  vars:
    syncthing_user: "syncthing"
    syncthing_home: "/var/lib/syncthing"
    vault_folder_id: "vault"
    vault_folder_path: "/var/lib/syncthing/vault"
    laptop_device_id: ""

  tasks:
    - name: Install Syncthing apt signing key
      get_url:
        url: https://syncthing.net/release-key.gpg
        dest: /usr/share/keyrings/syncthing-archive-keyring.gpg
        mode: "0644"

    - name: Add Syncthing apt repository (stable-v2 channel)
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable-v2"
        filename: syncthing
        state: present

    - name: Install Syncthing
      apt:
        name: syncthing
        state: latest
        update_cache: yes

    - name: Create Syncthing user
      user:
        name: "{{ syncthing_user }}"
        system: yes
        create_home: yes
        home: "{{ syncthing_home }}"

    - name: Create vault folder directory
      file:
        path: "{{ vault_folder_path }}"
        state: directory
        owner: "{{ syncthing_user }}"
        group: "{{ syncthing_user }}"
        mode: "0755"

    - name: Enable and start Syncthing service
      systemd:
        name: "syncthing@{{ syncthing_user }}"
        enabled: yes
        state: started

    - name: Wait for Syncthing REST API
      become_user: "{{ syncthing_user }}"
      shell: syncthing cli show system
      register: st_system
      retries: 10
      delay: 3
      until: st_system.rc == 0

    - name: Read server device ID
      become_user: "{{ syncthing_user }}"
      shell: |
        syncthing cli show system | grep -o '"myID": *"[^"]*"' | cut -d'"' -f4
      register: server_device_id
      changed_when: false

    - name: Add laptop as known device
      become_user: "{{ syncthing_user }}"
      shell: |
        if ! syncthing cli config devices list | grep -q "{{ laptop_device_id }}"; then
          syncthing cli config devices add --device-id "{{ laptop_device_id }}" --name laptop
        fi
      when: laptop_device_id | length > 0

    - name: Add vault folder (encrypted at rest)
      become_user: "{{ syncthing_user }}"
      shell: |
        if ! syncthing cli config folders list | grep -qx "{{ vault_folder_id }}"; then
          syncthing cli config folders add \
            --id "{{ vault_folder_id }}" --label Vault \
            --path "{{ vault_folder_path }}" --type receiveencrypted
        fi

    - name: Share vault folder with laptop
      become_user: "{{ syncthing_user }}"
      shell: |
        if ! syncthing cli config folders "{{ vault_folder_id }}" devices list | grep -q "{{ laptop_device_id }}"; then
          syncthing cli config folders "{{ vault_folder_id }}" devices add --device-id "{{ laptop_device_id }}"
        fi
      when: laptop_device_id | length > 0

    - name: Enable staggered file versioning on vault folder
      become_user: "{{ syncthing_user }}"
      shell: |
        KEY=$(syncthing cli config gui apikey get)
        curl -fsS -X PATCH -H "X-API-Key: $KEY" \
          -d '{"versioning":{"type":"staggered","params":{"maxAge":"31536000"}}}' \
          http://127.0.0.1:8384/rest/config/folders/{{ vault_folder_id }}

    - name: Allow sync traffic through firewall
      shell: |
        ufw allow 22000/tcp comment 'syncthing'
        ufw allow 22000/udp comment 'syncthing'

    - name: Print server device ID
      debug:
        msg: "Syncthing server device ID: {{ server_device_id.stdout }}"
