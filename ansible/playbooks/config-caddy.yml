---
- name: Update Caddy Configuration
  hosts: all
  become: true
  vars:
    bro_host: "{{ lookup('env', 'BRO_HOST') }}"
    coach_api_token: "{{ lookup('env', 'COACH_API_TOKEN') }}"

  tasks:
  - name: Require the coach API token
    assert:
      that:
        - coach_api_token | length > 0
      fail_msg: "Set COACH_API_TOKEN (see ~/dotfiles/.env) — the Caddyfile gates the coach and agents APIs with it."

  - name: Create log directory
    file:
      path: /var/log/caddy
      state: directory
      mode: '0755'
      owner: caddy
      group: caddy

  - name: Update Caddy configuration
    template:
      src: ../templates/Caddyfile.j2
      dest: /etc/caddy/Caddyfile
      owner: root
      group: root
    notify: Reload Caddy

  handlers:
  - name: Reload Caddy
    systemd:
      name: caddy
      state: restarted
