---
- name: Configure my-agents service
  hosts: all
  become: true

  tasks:

  - name: Ensure /opt/my-agents exists
    file:
      path: /opt/my-agents
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Update Agents systemd unit
    template:
      src: ../templates/Agents.j2
      dest: "/etc/systemd/system/agents.service"
      owner: root
      group: root
      mode: "0644"
    notify:
      - Reload systemd
      - Restart Agents

  handlers:
  - name: Reload systemd
    systemd:
      daemon_reload: yes
  - name: Restart Agents
    systemd:
      name: agents
      enabled: true
      state: restarted
