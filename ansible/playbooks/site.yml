---
- name: Keep administrative access hardened
  ansible.builtin.import_playbook: harden-ssh.yml
  tags:
    - access

- name: Converge the base server
  hosts: web_server
  become: true
  gather_facts: true
  serial: 1

  roles:
    - role: base
      tags:
        - base
    - role: caddy
      tags:
        - caddy
    - role: postgresql
      tags:
        - postgresql
    - role: cliproxyapi
      tags:
        - cliproxyapi
    - role: miniflux
      tags:
        - miniflux
    - role: dimalip
      tags:
        - dimalip
    - role: papujki
      tags:
        - papujki
    - role: runtime_secrets
      tags:
        - secrets

  post_tasks:
    - name: Enforce the public-listener allowlist
      ansible.builtin.include_role:
        name: listener_audit
        apply:
          tags:
            - always
      tags:
        - always
